# ============================================================================
#  Restoran Masa Düzeni Yapılandırması
# ============================================================================
#  Bu dosya restoranın FİZİKSEL düzenini tanımlar:
#       Bina  ->  Kat  ->  Salon  ->  Masa
#
#  Her "area.N" bir BİNA + KAT + SALON kombinasyonuna ait masa aralığıdır.
#
#  Alanlar:
#     building     — Bina adı (örn. "1. Bina", "Ana Bina")
#     floor        — Kat adı  (örn. "1. Kat", "Zemin", "Bahçe")
#                    (Eski sürüm uyumu için "section" anahtarı da kabul edilir)
#     salon        — (Opsiyonel) Salon adı (örn. "1. Salon")
#                    Salon yoksa boş bırakın → kat tek salonlu kabul edilir
#     startTableNo — O alana ait İLK masa numarası (örn. 101)
#     tableCount   — O alandaki masa SAYISI (örn. 5 = 101..105)
#
#  Numaralandırma ÖNERİSİ:
#     1. Bina / 1. Kat / 1. Salon → 101..105
#     1. Bina / 1. Kat / 2. Salon → 106..110
#     1. Bina / 2. Kat / 1. Salon → 111..115
#     2. Bina / 1. Kat / 1. Salon → 201..205
#     3. Bina / Bahçe             → 301..310
#  (Çakışma olmamasına dikkat: 101 hem A salonu hem B salonunda olamaz.)
#
#  Override için: dosyayı şu yola kopyalayıp düzenleyin:
#     C:\Users\<kullanıcı>\.budget\restaurant-layout.properties
#  Bu kullanıcı-yerli kopya JAR içindeki varsayılanı geçersiz kılar.
#
#  Düzenleme sonrası uygulamayı yeniden başlatın.
# ============================================================================

