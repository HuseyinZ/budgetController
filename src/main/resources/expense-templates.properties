# ============================================================================
#  Hızlı Gider Şablonları
# ============================================================================
#  Bu dosya "Giderler" panelindeki hızlı seçim butonlarını tanımlar.
#  Hem masaüstü uygulama (Swing) hem mobil PWA aynı listeyi kullanır.
#
#  FORMAT: templates = Ad|İkon|Mod, Ad|İkon|Mod, ...
#
#  Alanlar:
#    Ad   — buton üzerinde görünecek metin (örn. Domates)
#    İkon — emoji veya kısa metin (örn. 🍅). İstediğinizi koyabilirsiniz.
#    Mod  — "kg" → kg + kg fiyatı sorulur, otomatik hesaplanır
#         — "manuel" → toplam tutar sorulur
#
#  DÜZENLEMEK İÇİN:
#    Bu dosyayı şu yola kopyalayın:
#       C:\Users\<kullanıcı>\.budget\expense-templates.properties
#    Bu kullanıcı-yerli kopya JAR içindeki varsayılanı geçersiz kılar.
#
#  ÖRNEK EKLEME (sona virgülle ekle):
#    templates = Domates|🍅|kg, Biber|🌶️|kg, Yeni Ürün|🆕|manuel
#
#  ÖRNEK SİLME: virgüller arası girdiyi sil
#
#  Düzenleme sonrası uygulamayı yeniden başlatın.
# ============================================================================

templates = Domates|🍅|kg, Biber|🌶️|kg, Soğan|🧅|kg, \
            Salatalık|🥒|kg, Marul|🥬|kg, Limon|🍋|kg, Maydanoz|🌿|kg, \
            Et |🥩|kg, Tavuk|🍗|kg, \
            Ciğer|🥩|kg, Yumurta|🥚|manuel, Süt|🥛|manuel, Yoğurt|🥛|kg, \
            Peynir|🧀|kg, Ekmek|🍞|manuel, Lavaş|🥙|manuel, Pirinç|🍚|kg, \
            Bulgur|🌾|kg, Un|🌾|kg, Yağ|🛢️|manuel, Tuz|🧂|kg, \
            Baharat|🧂|manuel, Kömür|⚫|kg, Elektrik|⚡|manuel, \
            Su|💧|manuel, Doğalgaz|🔥|manuel, Maaş|💵|manuel, \
            Temizlik|🧴|manuel, Servis|🛠️|manuel, Vergi|📑|manuel, Diğer|📝|manuel
