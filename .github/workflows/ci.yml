# ============================================================================
#   CI — test + build kapıları (Phase A)
#
#   Her PR'da ve master push'ta çalışır:
#   1. test   → mvn -B test                      (tüm birim testleri)
#   2. build  → mvn -B clean package -DskipTests (derleme/paket doğrulaması)
#
#   Auto-merge (Phase C) için required status check adayları:
#     "Tests (mvn test)"  ve  "Build (package)"
#
#   Secret GEREKTİRMEZ.
# ============================================================================
name: ci

on:
  push:
    branches: [master]
  pull_request:

# Aynı branch/PR için önceki çalışmayı iptal et — kuyruk şişmesin
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:

  test:
    name: Tests (mvn test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Run tests
        run: mvn -B test

  build:
    name: Build (package)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Package (skip tests)
        run: mvn -B clean package -DskipTests
