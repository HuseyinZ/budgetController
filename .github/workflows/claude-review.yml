name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  review:
    name: Claude PR Review
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Review pull request
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            HEAD SHA: ${{ github.event.pull_request.head.sha }}

            Review this pull request. Read AGENTS.md first and enforce its risk rules.
            Focus on correctness, regressions, security, data integrity, and test coverage.
            Do not edit files, commit, push, approve, or merge.
            Post exactly one concise top-level PR comment using `gh pr comment`.

            The comment must begin with exactly these four lines, using the exact full
            HEAD SHA shown above:

            VERDICT: PASS
            HEAD_SHA: ${{ github.event.pull_request.head.sha }}
            RISK: LOW
            BEHAVIOR_CHANGE: NO

            Use VERDICT: CHANGES_REQUESTED instead of VERDICT: PASS when any blocking
            finding exists, when the change is not LOW risk, or when it changes runtime
            behavior. Keep the remaining three protocol lines unchanged. After the four
            required lines, include concise blocking findings with file and line references.
          claude_args: |
            --max-turns 12
            --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"

      - name: Enforce Claude verdict
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail

          expected_pass="VERDICT: PASS
          HEAD_SHA: ${HEAD_SHA}
          RISK: LOW
          BEHAVIOR_CHANGE: NO"

          expected_changes="VERDICT: CHANGES_REQUESTED
          HEAD_SHA: ${HEAD_SHA}
          RISK: LOW
          BEHAVIOR_CHANGE: NO"

          verdict="$({
            gh api --paginate \
              -H "Accept: application/vnd.github+json" \
              "/repos/${REPOSITORY}/issues/${PR_NUMBER}/comments?per_page=100" \
              --jq '[.[] | select(.user.login == "claude[bot]") | .body | select(startswith("VERDICT:"))] | last // ""'
          })"

          case "$verdict" in
            "$expected_pass"|"$expected_pass"$'\n'*)
              echo "Validated Claude PASS for ${HEAD_SHA}."
              exit 0
              ;;
            "$expected_changes"|"$expected_changes"$'\n'*)
              echo "Claude requested changes for ${HEAD_SHA}."
              exit 1
              ;;
            *)
              echo "No valid Claude verdict for current HEAD SHA ${HEAD_SHA}."
              exit 1
              ;;
          esac
