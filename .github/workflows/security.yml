# ============================================================================
#   Güvenlik CI — her PR'da + her gece
#
#   3 iş çalıştırır:
#   1. dependency-check  → OWASP NVD taraması (CVSS ≥ 7 build fail)
#   2. secret-scan       → gitleaks ile commit'lenmiş secret arama
#   3. sbom              → CycloneDX SBOM üret + artifact olarak yükle
#
#   Gerekli GitHub Secrets:
#     NVD_API_KEY           → https://nvd.nist.gov/developers/request-an-api-key
#                             (opsiyonel ama 30 dk → 2 dk hızlandırır)
# ============================================================================
name: security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Her gece 04:00 UTC (07:00 İstanbul) — yeni CVE'ler için
    - cron: '0 4 * * *'

permissions:
  contents: read
  security-events: write   # SARIF upload için

jobs:

  # ============================================================
  #   1. OWASP Dependency-Check
  # ============================================================
  dependency-check:
    name: OWASP Dependency-Check
    # PR'larda çalışmaz — NVD taraması uzun; master push + gece cron yeterli
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Restore NVD database cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          # run_id ile her koşuya benzersiz key: save hiçbir zaman "key exists"
          # no-op'una düşmez; restore en güncel veriyi prefix'ten alır.
          # v12 prefiksi: eski v10 H2 verisinin şema uyumsuzluğunu engeller.
          key: dep-check-v12-${{ runner.os }}-${{ github.run_id }}
          restore-keys: dep-check-v12-${{ runner.os }}-

      - name: Run OWASP Dependency-Check
        run: |
          mvn -B org.owasp:dependency-check-maven:check \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      # Tarama fail olsa bile indirilen NVD verisi kaydedilsin — bir sonraki
      # koşu sıfırdan indirmesin (restore/save ayrımının amacı bu)
      - name: Save NVD database cache
        uses: actions/cache/save@v4
        if: ${{ always() && !cancelled() }}
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: dep-check-v12-${{ runner.os }}-${{ github.run_id }}

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-check-report
          path: |
            target/dependency-check-report.html
            target/dependency-check-report.json
          retention-days: 30

  # ============================================================
  #   2. Secret scanning (gitleaks)
  # ============================================================
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # gitleaks tüm history'i okur

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Üretim sürümünde lisans gerekirse:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ============================================================
  #   3. SBOM üretimi (CycloneDX)
  # ============================================================
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Build + generate SBOM
        run: mvn -B -DskipTests package

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: |
            target/bom.json
            target/bom.xml
          retention-days: 90
